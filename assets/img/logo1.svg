<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="600" fill="#0f0f0d"/>
  <!-- Geometric logo mark -->
  <polygon points="300,120 440,340 160,340" fill="none" stroke="#e8e4d9" stroke-width="2.5"/>
  <polygon points="300,200 390,340 210,340" fill="#e8e4d9"/>
  <!-- Brand name -->
  <text x="300" y="430" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="600" fill="#e8e4d9" text-anchor="middle" letter-spacing="8">ARKOS</text>
  <text x="300" y="455" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="400" fill="#6b6b60" text-anchor="middle" letter-spacing="4">STUDIO</text>
  <!-- Corner label -->
  <text x="30" y="575" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#3a3a35" letter-spacing="3">IDENTIDAD VISUAL</text>
</svg>
