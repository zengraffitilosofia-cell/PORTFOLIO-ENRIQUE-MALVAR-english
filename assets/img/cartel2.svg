<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="800" fill="#f0ede6"/>
  <!-- Vertical stripe -->
  <rect x="0" y="0" width="12" height="800" fill="#1a1a18"/>
  <!-- Big geometric square -->
  <rect x="80" y="80" width="320" height="320" fill="#1a1a18"/>
  <rect x="110" y="110" width="260" height="260" fill="none" stroke="#f0ede6" stroke-width="1.5"/>
  <!-- Text inside square -->
  <text x="240" y="220" font-family="Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="700" fill="#f0ede6" text-anchor="middle">AF</text>
  <text x="240" y="260" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" font-weight="300" fill="#f0ede6" text-anchor="middle" letter-spacing="5" opacity="0.6">ARTE FUTURO</text>
  <!-- Small square accent -->
  <rect x="430" y="80" width="90" height="90" fill="none" stroke="#1a1a18" stroke-width="1"/>
  <rect x="445" y="95" width="60" height="60" fill="#1a1a18"/>
  <!-- Main title block -->
  <text x="80" y="468" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600" fill="#1a1a18" letter-spacing="5">EXPOSICIÓN</text>
  <text x="80" y="510" font-family="Georgia, serif" font-size="38" font-weight="400" fill="#1a1a18" font-style="italic">Formas</text>
  <text x="80" y="548" font-family="Georgia, serif" font-size="38" font-weight="400" fill="#1a1a18" font-style="italic">del Tiempo</text>
  <!-- Line -->
  <line x1="80" y1="568" x2="520" y2="568" stroke="#1a1a18" stroke-width="0.7"/>
  <!-- Details -->
  <text x="80" y="595" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#6b6b65" letter-spacing="2">MUSEO DE ARTE CONTEMPORÁNEO</text>
  <text x="80" y="615" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#6b6b65" letter-spacing="2">1 MARZO — 30 JUNIO 2025</text>
  <!-- Bottom label -->
  <text x="30" y="775" font-family="Helvetica Neue, Arial, sans-serif" font-size="7.5" fill="#b0aea8" letter-spacing="3">CARTELERÍA · EXPOSICIÓN</text>
</svg>
