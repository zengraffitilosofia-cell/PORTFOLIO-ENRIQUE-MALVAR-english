<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="600" fill="#f5f2eb"/>
  <!-- Circle mark -->
  <circle cx="300" cy="260" r="100" fill="none" stroke="#1a1a18" stroke-width="2"/>
  <circle cx="300" cy="260" r="70" fill="#1a1a18"/>
  <!-- Monogram V inside -->
  <text x="300" y="285" font-family="Georgia, serif" font-size="52" font-weight="400" fill="#f5f2eb" text-anchor="middle">V</text>
  <!-- Brand name -->
  <text x="300" y="415" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="600" fill="#1a1a18" text-anchor="middle" letter-spacing="7">VAULTA</text>
  <text x="300" y="438" font-family="Helvetica Neue, Arial, sans-serif" font-size="8.5" font-weight="400" fill="#8a8a80" text-anchor="middle" letter-spacing="3">CONSULTING GROUP</text>
  <!-- Divider -->
  <line x1="230" y1="395" x2="370" y2="395" stroke="#d0cec7" stroke-width="0.8"/>
  <!-- Corner label -->
  <text x="30" y="575" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#b0aea8" letter-spacing="3">BRANDING · MONOGRAMA</text>
</svg>
