<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" fill="#e8e5df" rx="8"/>
  <rect x="0" y="0" width="1200" height="44" fill="#d5d2cb" rx="8"/>
  <rect x="0" y="30" width="1200" height="14" fill="#d5d2cb"/>
  <circle cx="20" cy="22" r="5" fill="#e06c5a"/>
  <circle cx="38" cy="22" r="5" fill="#e0b84a"/>
  <circle cx="56" cy="22" r="5" fill="#5ab87a"/>
  <rect x="200" y="12" width="600" height="20" fill="#ebe8e2" rx="10"/>
  <text x="500" y="26" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#8a8880" text-anchor="middle">forma-arquitectos.es</text>

  <!-- Full bleed hero -->
  <rect x="0" y="44" width="1200" height="500" fill="#2a2820"/>
  <!-- Grid overlay lines -->
  <line x1="0" y1="144" x2="1200" y2="144" stroke="#3a3830" stroke-width="0.5"/>
  <line x1="300" y1="44" x2="300" y2="544" stroke="#3a3830" stroke-width="0.5"/>
  <line x1="900" y1="44" x2="900" y2="544" stroke="#3a3830" stroke-width="0.5"/>

  <!-- Nav overlay -->
  <text x="60" y="95" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="600" fill="#e8e4d9" letter-spacing="4">FORMA</text>
  <text x="60" y="110" font-family="Helvetica Neue, Arial, sans-serif" font-size="7" font-weight="300" fill="#6b6b60" letter-spacing="3">ARQUITECTOS</text>
  <text x="950" y="97" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#8a8880" letter-spacing="3">PROYECTOS</text>
  <text x="1060" y="97" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#8a8880" letter-spacing="3">ESTUDIO</text>

  <!-- Hero text -->
  <text x="60" y="280" font-family="Georgia, serif" font-size="64" font-weight="400" fill="#e8e4d9" font-style="italic">Arquitectura</text>
  <text x="60" y="345" font-family="Georgia, serif" font-size="64" font-weight="400" fill="#e8e4d9" font-style="italic">que perdura.</text>
  <text x="60" y="390" font-family="Helvetica Neue, Arial, sans-serif" font-size="9" fill="#6b6b60" letter-spacing="3">ESTUDIO DE ARQUITECTURA DESDE 2003</text>

  <!-- Scroll indicator -->
  <line x1="1150" y1="490" x2="1150" y2="520" stroke="#6b6b60" stroke-width="0.7"/>
  <text x="1150" y="535" font-family="Helvetica Neue, Arial, sans-serif" font-size="7" fill="#6b6b60" text-anchor="middle" letter-spacing="2">SCROLL</text>

  <!-- Project strip -->
  <rect x="0" y="544" width="1200" height="256" fill="#f0ede6"/>
  <text x="60" y="580" font-family="Helvetica Neue, Arial, sans-serif" font-size="8" fill="#8a8880" letter-spacing="5">PROYECTOS RECIENTES</text>
  <!-- 3 project thumbnails -->
  <rect x="60" y="595" width="330" height="170" fill="#d5d2cb" rx="2"/>
  <rect x="420" y="595" width="330" height="170" fill="#c8c5be" rx="2"/>
  <rect x="780" y="595" width="330" height="170" fill="#d0cdc6" rx="2"/>
  <text x="225" y="690" font-family="Helvetica Neue, Arial, sans-serif" font-size="8.5" fill="#1a1a18" text-anchor="middle">Casa Viento — Galicia</text>
  <text x="585" y="690" font-family="Helvetica Neue, Arial, sans-serif" font-size="8.5" fill="#1a1a18" text-anchor="middle">Edificio Roble — Madrid</text>
  <text x="945" y="690" font-family="Helvetica Neue, Arial, sans-serif" font-size="8.5" fill="#1a1a18" text-anchor="middle">Pabellón Sur — Sevilla</text>
  <text x="225" y="708" font-family="Helvetica Neue, Arial, sans-serif" font-size="7" fill="#8a8880" text-anchor="middle">Vivienda unifamiliar</text>
  <text x="585" y="708" font-family="Helvetica Neue, Arial, sans-serif" font-size="7" fill="#8a8880" text-anchor="middle">Uso residencial · 12 viviendas</text>
  <text x="945" y="708" font-family="Helvetica Neue, Arial, sans-serif" font-size="7" fill="#8a8880" text-anchor="middle">Equipamiento público</text>
